[manager]
prepend_keymap = [
  # Select all files in the current directory (mirrors % in Helix)
  { on = ["%"], run = "toggle_all --state=true", desc = "Select all" },
  # Clear selection (mirrors Escape behavior in Helix)
  { on = ["<Esc>"], run = ["escape", "toggle_all --state=false"], desc = "Escape and deselect all" },
]
